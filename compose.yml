services:
  app:
    build: .
    container_name: vivia-app
    restart: always
    environment:
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE:-dev}
      # DB_HOST se pasa al contenedor porque el wait-for-it del entrypoint lo usa.
      - DB_HOST=${DB_HOST}
      - DB_URL=jdbc:postgresql://${DB_HOST}:5432/${DB_NAME:-vivia}?sslmode=require
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD}
      - SERVER_PORT=${SERVER_PORT:-8080}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - REDIS_HOST=vivia-redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - RABBITMQ_HOST=vivia-rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USERNAME=${RABBITMQ_USER:-vivia}
      - RABBITMQ_PASSWORD=${RABBITMQ_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRATION=${JWT_EXPIRATION:-3600}
      - JWT_REFRESH_EXPIRATION=${JWT_REFRESH_EXPIRATION:-2592000000}
      - INTERNAL_API_KEY=${INTERNAL_API_KEY}
      - FIREBASE_KEY_PATH=/var/run/secrets/firebase-adminsdk.json
      - FCM_ENABLED=${FCM_ENABLED:-true}
      - FIRESTORE_ENABLED=${FIRESTORE_ENABLED:-false}
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_S3_BUCKET=${AWS_S3_BUCKET:-vivia-media-bucket}
      - AWS_SNS_REKOGNITION_ROLE_ARN=${AWS_SNS_REKOGNITION_ROLE_ARN}
      - AWS_REKOGNITION_SNS_TOPIC_ARN=${AWS_REKOGNITION_SNS_TOPIC_ARN}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
    volumes:
      - ${FIREBASE_KEY_HOST_PATH:-/var/run/secrets/firebase-adminsdk.json}:/var/run/secrets/firebase-adminsdk.json:ro
    networks:
      - vivia_network

networks:
  vivia_network:
    external: true
