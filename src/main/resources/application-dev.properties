# Perfil de Desarrollo - Vivia
spring.application.name=vivia-dev

# Base de Datos (PostgreSQL)
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/vivia_dev}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:}

# Configuración de Flyway
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration
# Evita que Flyway falle si hay scripts que ya se aplicaron manualmente
spring.flyway.validate-on-migrate=true

# Configuración de JPA / Hibernate
# Cambiado a 'validate' para que Flyway sea el dueño del esquema
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Configuración de Redis
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
# Tiempo de espera de conexión
spring.data.redis.connect-timeout=5000

# Logs detallados para desarrollo
logging.level.aleosh.online.vivia=DEBUG
logging.level.org.springframework.data.redis=DEBUG
logging.level.org.flywaydb=INFO

# Servidor
server.port=${SERVER_PORT:8080}
