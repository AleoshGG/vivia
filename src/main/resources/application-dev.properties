# Perfil de Desarrollo - Vivia
spring.application.name=vivia-dev

# Base de Datos (PostgreSQL)
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/vivia_dev}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:}

# Configuración de Flyway
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration
# Evita que Flyway falle si hay scripts que ya se aplicaron manualmente
spring.flyway.validate-on-migrate=true

# Configuración de JPA / Hibernate
# Cambiado a 'validate' para que Flyway sea el dueño del esquema
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Configuración de Redis
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
# Tiempo de espera de conexión
spring.data.redis.connect-timeout=5000

# Logs detallados para desarrollo
logging.level.aleosh.online.vivia=DEBUG
logging.level.org.springframework.data.redis=DEBUG
logging.level.org.flywaydb=INFO

# Servidor
server.port=${SERVER_PORT:8080}
spring.main.allow-bean-definition-overriding=true

# Google
google.client-id=${GOOGLE_CLIENT_ID:tu-id-de-cliente-aqui.apps.googleusercontent.com}

# Cloudinary
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
cloudinary.api-key=${CLOUDINARY_API_KEY:}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:}
cloudinary.upload-url=https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD_NAME:}/
cloudinary.signed-upload-expiration-seconds=${CLOUDINARY_UPLOAD_EXPIRATION:3600}

# RabbitMQ
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}
spring.rabbitmq.virtual-host=${RABBITMQ_VHOST:/}

# Property Draft Settings
vivia.property.draft.ttl-hours=24

# Media Validation
vivia.property.media.min-images=3
vivia.property.media.max-images=20
vivia.property.media.max-videos=3
vivia.property.media.max-image-size-bytes=10485760
vivia.property.media.max-video-size-bytes=209715200
vivia.property.media.allowed-image-types=image/jpeg,image/png
vivia.property.media.allowed-video-types=video/mp4