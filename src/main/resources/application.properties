spring.application.name=vivia
spring.profiles.active=dev

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/vivia_dev}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:}

jwt.secret=${JWT_SECRET:UnaClaveSecretaMuyLargaYSeguraParaQueHMACFuncioneCorrectamente123456}
jwt.expiration=${JWT_EXPIRATION:3600}
jwt.refresh.expiration=${JWT_REFRESH_EXPIRATION:2592000000}

aws.s3.bucket-name=${BUCKET_NAME:api-backend-media}
cloud.aws.credentials.access-key=${AWS_ACCESS_KEY_ID:default-access-key}
cloud.aws.credentials.secret-key=${AWS_SECRET_ACCESS_KEY:default-secret-key}
cloud.aws.credentials.session-token=${AWS_SESSION_TOKEN:}
cloud.aws.region.static=${AWS_REGION:us-east-1}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

logging.level.aleosh.online.mediaserver=debug
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=DEBUG

management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

server.port=${SERVER_PORT:8080}

default.photoUrl=${DEFAULT_URL_IMAGE:https://tu-bucket.s3.amazonaws.com/default-user.png}

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

firebase.credentials.path=file:${FIREBASE_KEY_PATH:/var/run/secrets/firebase-adminsdk.json}
spring.main.allow-bean-definition-overriding=true

# Cloudinary
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
cloudinary.api-key=${CLOUDINARY_API_KEY:}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:}
cloudinary.upload-url=https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD_NAME:}/
cloudinary.signed-upload-expiration-seconds=${CLOUDINARY_UPLOAD_EXPIRATION:3600}

# RabbitMQ
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}
spring.rabbitmq.virtual-host=${RABBITMQ_VHOST:/}

# Property Draft Settings
vivia.property.draft.ttl-hours=24

# Media Validation
vivia.property.media.min-images=3
vivia.property.media.max-images=20
vivia.property.media.max-videos=3
vivia.property.media.max-image-size-bytes=10485760
vivia.property.media.max-video-size-bytes=209715200
vivia.property.media.allowed-image-types=image/jpeg,image/png
vivia.property.media.allowed-video-types=video/mp4
