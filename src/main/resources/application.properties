spring.application.name=vivia
spring.profiles.active=dev

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/vivia_dev}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:}

jwt.secret=${JWT_SECRET:UnaClaveSecretaMuyLargaYSeguraParaQueHMACFuncioneCorrectamente123456}
jwt.expiration=${JWT_EXPIRATION:3600}
jwt.refresh.expiration=${JWT_REFRESH_EXPIRATION:2592000000}


spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

logging.level.aleosh.online.mediaserver=debug
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=DEBUG

management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

server.port=${SERVER_PORT:8080}

default.photoUrl=${DEFAULT_URL_IMAGE:https://via.placeholder.com/150}

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

firebase.credentials.path=file:${FIREBASE_KEY_PATH:/var/run/secrets/firebase-adminsdk.json}
fcm.enabled=${FCM_ENABLED:true}
firestore.enabled=${FIRESTORE_ENABLED:false}
spring.main.allow-bean-definition-overriding=true

# AWS
aws.region=${AWS_REGION:us-east-1}
aws.access-key-id=${AWS_ACCESS_KEY_ID:}
aws.secret-access-key=${AWS_SECRET_ACCESS_KEY:}
aws.s3.bucket=${AWS_S3_BUCKET:vivia-media-bucket}
aws.s3.presigned-url-expiration-minutes=15
aws.rekognition.sns-role-arn=${AWS_SNS_REKOGNITION_ROLE_ARN:}
aws.rekognition.sns-topic-arn=${AWS_REKOGNITION_SNS_TOPIC_ARN:}
vivia.rekognition.moderation-confidence-threshold=75

# RabbitMQ
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}
spring.rabbitmq.virtual-host=${RABBITMQ_VHOST:/}

# Seguridad interna para webhooks de validación
vivia.internal.api-key=${INTERNAL_API_KEY:change-me-in-production}

# Property Draft Settings
vivia.property.draft.ttl-hours=24

# Media Validation
vivia.property.media.min-images=1
vivia.property.media.max-images=20
vivia.property.media.max-videos=3
vivia.property.media.max-image-size-bytes=10485760
vivia.property.media.max-video-size-bytes=209715200
vivia.property.media.allowed-image-types=image/jpeg,image/png
vivia.property.media.allowed-video-types=video/mp4

# Swagger UI detrás de NGINX (prefix /api/ stripped)
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.config-url=/api/v3/api-docs/swagger-config
springdoc.swagger-ui.url=/api/v3/api-docs
springdoc.swagger-ui.disable-swagger-default-url=true
server.forward-headers-strategy=framework
